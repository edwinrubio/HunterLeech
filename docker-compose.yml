services:
  neo4j:
    image: neo4j:5.26.24-community
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    volumes:
      - ./data/neo4j:/data
      - ./data/neo4j_logs:/logs
      - ./infra/neo4j/plugins:/plugins
      - ./infra/neo4j:/var/lib/neo4j/import/infra
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      SOCRATA_APP_TOKEN: "${SOCRATA_APP_TOKEN}"
      PUBLIC_MODE: "${PUBLIC_MODE:-true}"
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      SOCRATA_APP_TOKEN: "${SOCRATA_APP_TOKEN}"
      LOAD_DATA_BOOTLOADER: "${LOAD_DATA_BOOTLOADER:-false}"
    volumes:
      - ./infra/neo4j/schema.cypher:/app/schema/schema.cypher:ro
      - ./.etl_state:/app/.etl_state
    depends_on:
      neo4j:
        condition: service_healthy
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes: {}
