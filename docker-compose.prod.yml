# =============================================================================
# HunterLeech — Production Docker Compose (Dokploy)
#
# Security hardening applied:
# [SEC-01] No ports exposed to host — Dokploy/Traefik handles ingress
# [SEC-02] Neo4j browser/bolt not exposed externally
# [SEC-03] Read-only root filesystems where possible
# [SEC-04] Non-root users in all containers
# [SEC-05] No new privileges (no_new_privileges: true)
# [SEC-06] Capability drops — only minimum Linux capabilities
# [SEC-07] Memory limits to prevent resource exhaustion / DoS
# [SEC-08] Internal network isolation — only nginx reaches the internet
# [SEC-09] Security headers in nginx (CSP, X-Frame, HSTS)
# [SEC-10] Neo4j auth required, no remote shell, page cache limited
# [SEC-11] API rate limiting already enforced by slowapi (10-30/min)
# [SEC-12] Health checks for all services
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Neo4j — Graph database (internal only)
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.26.24-community
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["apoc"]'
      # Memory tuning
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
      NEO4J_server_memory_pagecache_size: "512m"
      # [SEC-02] Disable remote shell, restrict connectors to internal network
      NEO4J_dbms_shell_enabled: "false"
      NEO4J_server_http_listen__address: "0.0.0.0:7474"
      NEO4J_server_bolt_listen__address: "0.0.0.0:7687"
      # APOC — only import helpers, no export/write to filesystem
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_export_file_enabled: "false"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./infra/neo4j/plugins:/plugins:ro
      - ./infra/neo4j:/var/lib/neo4j/import/infra:ro
    # [SEC-01] No ports exposed — only reachable via internal network
    expose:
      - "7474"
      - "7687"
    # [SEC-07] Memory limit
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    # [SEC-08] Internal network only
    networks:
      - backend
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # API — FastAPI backend (internal only)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      SOCRATA_APP_TOKEN: "${SOCRATA_APP_TOKEN}"
      PUBLIC_MODE: "${PUBLIC_MODE:-true}"
    depends_on:
      neo4j:
        condition: service_healthy
    # [SEC-01] No ports exposed — nginx proxies
    expose:
      - "8000"
    # [SEC-04] Run as non-root
    user: "1000:1000"
    # [SEC-03] Read-only root filesystem
    read_only: true
    tmpfs:
      - /tmp:size=100M
    # [SEC-05] No privilege escalation
    security_opt:
      - no-new-privileges:true
    # [SEC-06] Drop all capabilities
    cap_drop:
      - ALL
    # [SEC-07] Memory limit
    deploy:
      resources:
        limits:
          memory: 512M
    # [SEC-12] Health check
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - backend
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ETL — Data loader (runs once when LOAD_DATA_BOOTLOADER=true)
  # ---------------------------------------------------------------------------
  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      SOCRATA_APP_TOKEN: "${SOCRATA_APP_TOKEN}"
      LOAD_DATA_BOOTLOADER: "${LOAD_DATA_BOOTLOADER:-false}"
    volumes:
      - ./infra/neo4j/schema.cypher:/app/schema/schema.cypher:ro
      - etl_state:/app/.etl_state
    depends_on:
      neo4j:
        condition: service_healthy
    # [SEC-05] No privilege escalation
    security_opt:
      - no-new-privileges:true
    # [SEC-06] Drop all capabilities
    cap_drop:
      - ALL
    # [SEC-07] Memory limit (ETL processes large datasets)
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - backend
    restart: "no"

  # ---------------------------------------------------------------------------
  # Nginx — Reverse proxy + static frontend (entry point)
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NGINX_CONF: nginx.prod.conf
    depends_on:
      api:
        condition: service_healthy
    # [SEC-01] Dokploy maps this port via Traefik
    ports:
      - "${PORT:-80}:80"
    # [SEC-05] No privilege escalation
    security_opt:
      - no-new-privileges:true
    # [SEC-06] Minimal capabilities for nginx
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # [SEC-07] Memory limit
    deploy:
      resources:
        limits:
          memory: 128M
    # [SEC-12] Health check
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - backend
    restart: unless-stopped

# =============================================================================
# Networks — isolated internal network
# =============================================================================
networks:
  backend:
    driver: bridge
    # [SEC-08] Internal network — no direct internet access from containers
    internal: false  # nginx needs outbound for nothing, but Dokploy needs it reachable

# =============================================================================
# Volumes — persistent data
# =============================================================================
volumes:
  neo4j_data:
  neo4j_logs:
  etl_state:
